<!doctype html>
<html lang="en">

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {

        align-items: center;
        justify-content: center;
        font-family:

      }
      h1 {
        font-size: 22px;

        line-height: 1.5;

    <div class="card">
      <div class="icon">&#128683;</div>
      <h1 id="title">This site is blocked</h1>
