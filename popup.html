<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 280px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #fafafa;
        color: #222;
        padding: 16px;
      }
      h1 {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .subtitle {
        font-size: 11px;
        color: #888;
        margin-bottom: 16px;
      }
      .site-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #eee;
      }
      .site-row:last-child {
        border-bottom: none;
      }
      .site-info {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .site-icon {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
      }
      .site-icon.linkedin {
        background: #0a66c2;
      }
      .site-icon.youtube {
        background: #cc0000;
      }
      .site-name {
        font-size: 13px;
        font-weight: 500;
      }

      .toggle {
        position: relative;
        width: 40px;
        height: 22px;
        flex-shrink: 0;
      }
      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .toggle .slider {
        position: absolute;
        inset: 0;
        background: #ccc;
        border-radius: 22px;
        cursor: pointer;
        transition: background 0.2s;
      }
      .toggle .slider::before {
        content: "";
        position: absolute;
        top: 3px;
        left: 3px;
        width: 16px;
        height: 16px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.2s;
      }
      .toggle input:checked + .slider {
        background: #333;
      }
      .toggle input:checked + .slider::before {
        transform: translateX(18px);
      }
    </style>
  </head>
  <body>
    <h1>Unrecommended</h1>
    <p class="subtitle">Toggle blocking per site</p>

    <div class="site-row">
      <div class="site-info">
        <div class="site-icon linkedin">in</div>
        <span class="site-name">LinkedIn</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-linkedin" checked />
        <span class="slider"></span>
      </label>
    </div>

    <div class="site-row">
      <div class="site-info">
        <div class="site-icon youtube">YT</div>
        <span class="site-name">YouTube</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="toggle-youtube" checked />
        <span class="slider"></span>
      </label>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
