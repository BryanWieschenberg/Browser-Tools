<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        width: 280px;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #fafafa;
        color: #222;
        padding: 16px;
      }
      h1 {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 12px;
      }
      .section {
        margin-bottom: 14px;
      }
      .section:last-child {
        margin-bottom: 0;
      }
      .section-title {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #999;
        margin-bottom: 6px;
      }
      .tool-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid #eee;
      }
      .tool-row:last-child {
        border-bottom: none;
      }
      .tool-info {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .tool-icon {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
      }
      .tool-icon.linkedin {
        background: #0a66c2;
      }
      .tool-icon.youtube {
        background: #cc0000;
      }
      .tool-icon.instagram {
        background: #c13584;
      }
      .tool-icon.gdocs {
        background: #4285f4;
      }
      .tool-icon.gsheets {
        background: #0f9d58;
      }
      .tool-icon.gslides {
        background: #f4b400;
      }
      .tool-icon.canvas {
        background: #e03c31;
      }
      .tool-name {
        font-size: 13px;
        font-weight: 500;
      }
      .status {
        font-size: 11px;
        font-weight: 600;
        color: #2e7d32;
        background: #e8f5e9;
        padding: 3px 8px;
        border-radius: 12px;
      }

      .toggle {
        position: relative;
        width: 36px;
        height: 20px;
        flex-shrink: 0;
      }
      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .toggle .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #ccc;
        border-radius: 20px;
        transition: background 0.2s;
      }
      .toggle .slider::before {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        left: 2px;
        bottom: 2px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.2s;
      }
      .toggle input:checked + .slider {
        background: #2e7d32;
      }
      .toggle input:checked + .slider::before {
        transform: translateX(16px);
      }
    </style>
  </head>
  <body>
    <h1>Browser Tools</h1>

    <div class="section">
      <div class="section-title">Algorithm Blockers</div>

      <div class="tool-row">
        <div class="tool-info">
          <div class="tool-icon linkedin">in</div>
          <span class="tool-name">LinkedIn</span>
        </div>
        <span class="status">Active</span>
      </div>

      <div class="tool-row">
        <div class="tool-info">
          <div class="tool-icon youtube">YT</div>
          <span class="tool-name">YouTube</span>
        </div>
        <span class="status">Active</span>
      </div>

      <div class="tool-row">
        <div class="tool-info">
          <div class="tool-icon instagram">IG</div>
          <span class="tool-name">Instagram</span>
        </div>
        <span class="status">Active</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Dark Mode</div>

      <div class="tool-row">
        <div class="tool-info">
          <div class="tool-icon gdocs">Do</div>
          <span class="tool-name">Google Docs</span>
        </div>
        <label class="toggle">
          <input type="checkbox" data-tool="darkmode_gdocs" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="tool-row">
        <div class="tool-info">
          <div class="tool-icon gslides">Sl</div>
          <span class="tool-name">Google Slides</span>
        </div>
        <label class="toggle">
          <input type="checkbox" data-tool="darkmode_gslides" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="tool-row">
        <div class="tool-info">
          <div class="tool-icon gsheets">Sh</div>
          <span class="tool-name">Google Sheets</span>
        </div>
        <label class="toggle">
          <input type="checkbox" data-tool="darkmode_gsheets" />
          <span class="slider"></span>
        </label>
      </div>

      <div class="tool-row">
        <div class="tool-info">
          <div class="tool-icon canvas">Ca</div>
          <span class="tool-name">Canvas</span>
        </div>
        <label class="toggle">
          <input type="checkbox" data-tool="darkmode_canvas" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
